{% extends "base/base.html" %}

{% block head %}
<style>
    .send-message {
        width: 400px;
        height: 200px;
        resize: none;
    }
</style>
{% endblock %}

{% block body %}
<div class="title">
    <h2>ارسال پیام به ما</h2>
</div>
<div class="send-message-wrapper">
    <form action="/send-ticket" method="post" id="form">
        <p>نام کاربری: </p>
        <input type="text" value="{{ session.data.username }}" name="username" id="username" readonly required>
        <p>پیام:</p>
        <textarea name="message" id="send-message" class="send-message" required></textarea>
    </form>
    <button class="send_message" onclick="send_message()">ارسال</button>
</div>

<script>
    function send_message() {
        var message = document.getElementById("send-message");
        var form = document.getElementById("form");
        
        if (message.value.trim() === "") {
            alert("پیام خالی ارسال نمیشه.");
        } else {
            form.submit();
        }
    }
</script>
{% endblock %}
