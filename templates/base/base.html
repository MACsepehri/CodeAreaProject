<!DOCTYPE html>

    <meta name="keywords" content="CodeArea, مسابقات برنامه نویسی, برنامه نویسی آنلاین, چالش برنامه نویسی, Python, C++, Java, JavaScript, مسابقه کدنویسی, ایران">

    <meta name="author" content="آرین سپهری مهر (MACsepehri)">
    <meta name="robots" content="index, follow">
    <meta name="language" content="fa">
    <meta name="theme-color" content="#0d1117">
    <link rel="canonical" href="https://codearea.pythonanywhere.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="CodeArea | مسابقات برنامه نویسی آنلاین">

    <meta property="og:url" content="https://codearea.pythonanywhere.com/">
    <meta property="og:site_name" content="CodeArea">
    <meta property="og:locale" content="fa_IR">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CodeArea | مسابقات برنامه نویسی">

      "inLanguage":"fa-IR",
      "author":{
        "@type":"Person",
        "name":"آرین سپهری مهر",
        "alternateName":"MACsepehri"

    {% endblock %}
